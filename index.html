<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 Fund Collection Tracker</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body>
  <header>
    <h1>💙 2026 Fund Collection Tracker</h1>
    <div id="overall-total">Overall Total: Rs. 0</div>
    <div id="month-total">Monthly Total: Rs. 0</div>
    <nav id="month-tabs" class="tabs"></nav>
    <p class="subtitle">Updates automatically every 30 seconds</p>
  </header>

  <div class="controls">
    <input type="text" id="search-input" placeholder="🔍 Search by name or index..." class="search-box">
    <div class="control-buttons">
      <select id="sort-select" class="sort-select">
        <option value="index">Sort by Index</option>
        <option value="name">Sort by Name</option>
        <option value="amount-desc">Amount (High to Low)</option>
        <option value="amount-asc">Amount (Low to High)</option>
      </select>
      <button id="export-btn" class="export-btn">📥 Export</button>
    </div>
  </div>

  <main>
    <div class="table-container">
      <table id="contributor-table">
        <thead>
          <tr>
            <th>Index</th>
            <th>Name</th>
            <th>Contribution</th>
            <th>Month</th>
          </tr>
        </thead>
        <tbody id="contributor-body">
        </tbody>
      </table>
    </div>
    
    <div id="pagination" class="pagination"></div>
    <div id="status" class="status">Loading...</div>
  </main>

  <script src="app.js"></script>
</body>
</html>
